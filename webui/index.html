<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>picrawler telemetry</title>
<style>
  :root, :root[data-theme="dark"] {
    color-scheme: dark;
    --page:           #0d0d0d;
    --surface:        #1a1a19;
    --surface-2:      #141413;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --grid:           #2c2c2a;
    --baseline:       #383835;
    --border:         rgba(255,255,255,0.10);
    --series-1:       #3987e5;
    --series-1-soft:  rgba(57,135,229,0.18);
    --good:           #0ca30c;
    --warning:        #fab219;
    --serious:        #ec835a;
    --critical:       #d03b3b;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --page:           #f9f9f7;
    --surface:        #fcfcfb;
    --surface-2:      #f2f1ed;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --grid:           #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6;
    --series-1-soft:  rgba(42,120,214,0.12);
    --good:           #0ca30c;
    --warning:        #c98500;
    --serious:        #ec835a;
    --critical:       #d03b3b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .mono {
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    font-variant-numeric: tabular-nums;
  }

  /* ---------------- top bar ---------------- */
  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  #topbar h1 { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; }
  #topbar h1 span { color: var(--text-muted); font-weight: 450; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 2px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); }
  .pill.ok .dot         { background: var(--good); }
  .pill.connecting .dot { background: var(--warning); }
  .pill.err .dot        { background: var(--critical); }

  .conn-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .conn-controls input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-primary);
    padding: 5px 10px;
    font: inherit;
    font-size: 12.5px;
    width: 210px;
    max-width: 50vw;
  }
  button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-primary);
    padding: 5px 12px;
    font: inherit;
    font-size: 12.5px;
    cursor: pointer;
  }
  button:hover { border-color: var(--baseline); }
  button.primary { background: var(--series-1); border-color: var(--series-1); color: #fff; }
  button.small { padding: 2px 8px; font-size: 11.5px; }

  /* ---------------- main split ---------------- */
  #main { flex: 1; display: flex; min-height: 0; }

  #viewport-wrap { position: relative; flex: 1; min-width: 0; }
  #viewport { position: absolute; inset: 0; display: block; }

  /* drag gutter between viewport and side panel */
  #resizer {
    flex: 0 0 6px;
    cursor: col-resize;
    background: transparent;
    position: relative;
    z-index: 5;
  }
  #resizer::before {
    content: "";
    position: absolute;
    inset: 0 2px;
    background: var(--border);
    transition: background 0.12s;
  }
  #resizer:hover::before, #resizer.dragging::before { background: var(--series-1); }
  body.col-resizing { cursor: col-resize; user-select: none; }
  body.col-resizing #viewport { pointer-events: none; }

  #hud {
    position: absolute;
    left: 12px;
    bottom: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    pointer-events: none;
  }
  .hud-chip {
    background: color-mix(in srgb, var(--surface) 82%, transparent);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    backdrop-filter: blur(6px);
    font-size: 12px;
    color: var(--text-secondary);
  }
  .hud-chip b {
    display: block;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .hud-chip small { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .hud-chip .status-good     { color: var(--good); }
  .hud-chip .status-warning  { color: var(--warning); }
  .hud-chip .status-serious  { color: var(--serious); }
  .hud-chip .status-critical { color: var(--critical); }

  #orbit-hint {
    position: absolute;
    right: 12px;
    bottom: 12px;
    font-size: 11px;
    color: var(--text-muted);
    background: color-mix(in srgb, var(--surface) 82%, transparent);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    pointer-events: none;
  }

  /* ---------------- side panel ---------------- */
  #panel {
    width: 400px;
    flex: 0 0 auto;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .panel-head .actions { display: flex; gap: 6px; }
  .panel-head .reading {
    font-weight: 600;
    letter-spacing: 0;
    text-transform: none;
    font-variant-numeric: tabular-nums;
  }
  .panel-head .reading .status-good     { color: var(--good); }
  .panel-head .reading .status-warning  { color: var(--warning); }
  .panel-head .reading .status-serious  { color: var(--serious); }
  .panel-head .reading .status-critical { color: var(--critical); }

  #battery {
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border);
  }
  #batt-chart { display: block; width: 100%; height: 96px; cursor: crosshair; }
  #batt-chart .axis-label { fill: var(--text-muted); font-size: 9.5px; font-variant-numeric: tabular-nums; }
  #batt-chart .grid-line  { stroke: var(--grid); stroke-width: 1; }
  #batt-chart .batt-area  { fill: var(--series-1-soft); }
  #batt-chart .batt-line  { fill: none; stroke: var(--series-1); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  #batt-chart .cross      { stroke: var(--text-muted); stroke-width: 1; stroke-dasharray: 3 3; }
  #batt-chart .cross-dot  { fill: var(--series-1); stroke: var(--surface); stroke-width: 2; }
  #batt-empty { color: var(--text-muted); font-size: 12px; padding: 24px 0; text-align: center; }
  #batt-tip {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.28);
    padding: 5px 9px;
    font-size: 11.5px;
    color: var(--text-secondary);
    display: none;
    white-space: nowrap;
  }
  #batt-tip b { color: var(--text-primary); font-variant-numeric: tabular-nums; }

  #readout {
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  #readout table { border-collapse: collapse; width: 100%; font-size: 12px; }
  #readout th {
    text-align: left;
    font-weight: 500;
    color: var(--text-muted);
    padding: 3px 8px 3px 0;
    border-bottom: 1px solid var(--grid);
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: 0.05em;
  }
  #readout td { padding: 4px 8px 4px 0; color: var(--text-secondary); white-space: nowrap; }
  #readout td.leg { color: var(--text-primary); }
  #readout tr + tr td { border-top: 1px solid var(--grid); }
  #readout .at  { color: var(--text-secondary); }
  #readout .mov { color: var(--series-1); }
  #readout .lim { color: var(--serious); }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 4px 12px 10px;
    font-size: 12px;
    line-height: 1.55;
  }
  .log-line { display: flex; gap: 8px; }
  .log-line .ts { color: var(--text-muted); flex-shrink: 0; }
  .log-line .msg { color: var(--text-secondary); word-break: break-word; }
  .log-line.sys .msg  { color: var(--text-primary); }
  .log-line.good .msg { color: var(--good); }
  .log-line.warn .msg { color: var(--warning); }
  .log-line.err .msg  { color: var(--critical); }
  .log-line.batt .msg { color: var(--text-secondary); }

  @media (max-width: 880px) {
    #main { flex-direction: column; }
    #viewport-wrap { flex: none; height: 48vh; }
    #resizer { display: none; }
    #panel { width: 100% !important; flex: 1; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
<script type="importmap">
  { "imports": { "three": "./vendor/three.module.min.js" } }
</script>
</head>
<body>

<div id="topbar">
  <h1 id="robot-name">picrawler <span>telemetry</span></h1>
  <span class="pill" id="conn-pill"><span class="dot"></span><span id="conn-label">disconnected</span></span>
  <div class="conn-controls">
    <input id="ws-url" type="text" spellcheck="false" placeholder="ws://robot:8765">
    <button id="connect-btn" class="primary">Connect</button>
    <button id="demo-btn" title="Preview with generated data">Demo</button>
    <button id="labels-btn" title="Show joint names and channels in 3D">Labels</button>
    <button id="leg-names-btn" title="Show leg names from config in 3D">Leg names</button>
    <button id="theme-btn" title="Toggle light/dark">◐</button>
  </div>
</div>

<div id="main">
  <div id="viewport-wrap">
    <canvas id="viewport"></canvas>
    <div id="hud">
      <div class="hud-chip"><small>battery</small><b id="hud-batt">—</b><span id="hud-batt-sub">no reading</span></div>
      <div class="hud-chip"><small>servos</small><b id="hud-servo">—</b><span id="hud-servo-sub">waiting</span></div>
      <div class="hud-chip"><small>telemetry</small><b id="hud-rate">—</b><span id="hud-rate-sub">no packets</span></div>
    </div>
    <div id="orbit-hint">drag orbit · scroll zoom · right-drag pan</div>
  </div>

  <div id="resizer" title="Drag to resize · double-click to reset"></div>

  <div id="panel">
    <div class="panel-head">
      <span>Battery voltage</span>
      <span class="reading" id="batt-reading">—</span>
    </div>
    <div id="battery">
      <svg id="batt-chart" preserveAspectRatio="none"></svg>
      <div id="batt-empty">waiting for a battery reading…</div>
    </div>

    <div class="panel-head"><span>Joint readout</span></div>
    <div id="readout" class="mono">
      <table>
        <thead><tr><th>leg</th><th>coxa</th><th>femur</th><th>tibia</th></tr></thead>
        <tbody id="readout-body"></tbody>
      </table>
    </div>
    <div class="panel-head">
      <span>Event log</span>
      <span class="actions">
        <button class="small" id="log-pause">Pause</button>
        <button class="small" id="log-clear">Clear</button>
      </span>
    </div>
    <div id="log" class="mono"></div>
  </div>
</div>

<div id="batt-tip"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "./vendor/OrbitControls.js";

/* ================= theme ================= */
const themeBtn = document.getElementById("theme-btn");
document.documentElement.dataset.theme = localStorage.getItem("pc-theme") || "dark";
themeBtn.addEventListener("click", () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("pc-theme", next);
  applySceneTheme();
});
function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

/* ================= event log ================= */
const logEl = document.getElementById("log");
let logPaused = false;
document.getElementById("log-pause").addEventListener("click", (e) => {
  logPaused = !logPaused;
  e.target.textContent = logPaused ? "Resume" : "Pause";
});
document.getElementById("log-clear").addEventListener("click", () => (logEl.innerHTML = ""));

function log(msg, cls = "") {
  if (logPaused) return;
  const nearBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40;
  const line = document.createElement("div");
  line.className = "log-line " + cls;
  const ts = new Date().toLocaleTimeString("en-GB", { hour12: false });
  line.innerHTML = `<span class="ts">${ts}</span><span class="msg"></span>`;
  line.querySelector(".msg").textContent = msg;
  logEl.appendChild(line);
  while (logEl.childElementCount > 400) logEl.firstElementChild.remove();
  if (nearBottom) logEl.scrollTop = logEl.scrollHeight;
}

/* ================= connection ================= */
const wsInput   = document.getElementById("ws-url");
const connBtn   = document.getElementById("connect-btn");
const demoBtn   = document.getElementById("demo-btn");
const connPill  = document.getElementById("conn-pill");
const connLabel = document.getElementById("conn-label");

const defaultHost = location.hostname && location.protocol.startsWith("http")
  ? location.hostname : "raspberrypi.local";
wsInput.value = localStorage.getItem("pc-ws-url") || `ws://${defaultHost}:8765`;

let ws = null;
let wantConnect = false;
let reconnectTimer = null;
let demoTimer = null;

function setConn(state, label) {
  connPill.className = "pill " + state;
  connLabel.textContent = label;
}

function connect() {
  stopDemo();
  wantConnect = true;
  const url = wsInput.value.trim();
  localStorage.setItem("pc-ws-url", url);
  clearTimeout(reconnectTimer);
  if (ws) { ws.onclose = null; ws.close(); }

  setConn("connecting", "connecting…");
  log(`connecting to ${url}`, "sys");
  try {
    ws = new WebSocket(url);
  } catch {
    setConn("err", "bad URL");
    log(`invalid websocket URL: ${url}`, "err");
    return;
  }
  ws.onopen = () => {
    setConn("ok", "live");
    connBtn.textContent = "Disconnect";
    log("telemetry link established", "good");
  };
  ws.onmessage = (ev) => {
    try { handleSnapshot(JSON.parse(ev.data)); } catch { /* ignore malformed */ }
  };
  ws.onclose = () => {
    if (!wantConnect) return;
    setConn("err", "reconnecting…");
    log("link lost — retrying in 2s", "err");
    reconnectTimer = setTimeout(connect, 2000);
  };
}

function disconnect(silent = false) {
  const was = wantConnect;
  wantConnect = false;
  clearTimeout(reconnectTimer);
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  setConn("", "disconnected");
  connBtn.textContent = "Connect";
  if (was && !silent) log("disconnected", "sys");
}

connBtn.addEventListener("click", () => (wantConnect ? disconnect() : connect()));
wsInput.addEventListener("keydown", (e) => { if (e.key === "Enter") connect(); });

/* ================= demo mode ================= */
function startDemo() {
  disconnect(true);
  setConn("connecting", "demo");
  demoBtn.textContent = "Stop demo";
  log("demo mode — generated data, no robot attached", "sys");
  let t = 0;
  const legIds = ["front_left", "front_right", "back_left", "back_right"];
  const offsets = [[60,60,0],[60,-60,0],[-60,60,0],[-60,-60,0]];
  const coxaDirs = { front_left: -1, front_right: -1, back_left: -1, back_right: -1 };
  demoTimer = setInterval(() => {
    t += 0.05;
    const target = Math.sin(t / 2) > 0 ? 45 : 0;
    handleSnapshot({
      type: "telemetry",
      ts_ms: Date.now(),
      name: "picrawler (demo)",
      battery_v: 7.6 + 0.25 * Math.sin(t / 8) + (Math.random() - 0.5) * 0.03,
      all_at_target: false,
      geometry: { coxa_length_mm: 33, femur_length_mm: 48, tibia_length_mm: 78 },
      legs: legIds.map((id, li) => ({
        id, mount_offset_mm: offsets[li],
        joints: ["coxa", "femur", "tibia"].map((name, ji) => {
          const angle = 45 + 40 * Math.sin(t + li * 1.6 + ji * 0.7);
          return {
            name, channel: li * 3 + ji,
            angle_deg: angle, target_deg: target,
            min_deg: 0, max_deg: 90,
            direction: name === "coxa" ? coxaDirs[id] : 1,
            at_target: Math.abs(angle - target) < 2,
          };
        }),
      })),
    });
  }, 50);
}
function stopDemo() {
  if (!demoTimer) return;
  clearInterval(demoTimer);
  demoTimer = null;
  demoBtn.textContent = "Demo";
  log("demo mode stopped", "sys");
}
demoBtn.addEventListener("click", () => {
  if (demoTimer) { stopDemo(); setConn("", "disconnected"); }
  else startDemo();
});

/* ================= HUD + readout ================= */
let msgTimes = [];
let lastMsgAt = 0;
let lastBattLogged = null;
let prevTargets = new Map();   // channel -> target
let prevAllAtTarget = null;
const limitWarned = new Set(); // channels currently pinned at a limit

function battStatus(v) {
  if (v >= 7.4) return ["good", "healthy"];
  if (v >= 6.9) return ["warning", "getting low"];
  if (v >= 6.5) return ["serious", "low"];
  return ["critical", "critical"];
}

function renderHud(snap) {
  const now = performance.now();
  msgTimes.push(now);
  msgTimes = msgTimes.filter((t) => now - t < 3000);
  lastMsgAt = Date.now();
  // rate over the true elapsed span of the retained samples (not a fixed 3 s
  // divisor, which biases the estimate at the window edge)
  const span = (now - msgTimes[0]) / 1000;
  const rate = msgTimes.length > 1 && span > 0 ? (msgTimes.length - 1) / span : null;
  document.getElementById("hud-rate").textContent =
    rate ? rate.toFixed(0) + " Hz" : "—";

  const battEl = document.getElementById("hud-batt");
  const battSub = document.getElementById("hud-batt-sub");
  if (typeof snap.battery_v === "number") {
    const [cls, label] = battStatus(snap.battery_v);
    battEl.textContent = snap.battery_v.toFixed(2) + " V";
    battSub.innerHTML = `<span class="status-${cls}">● ${label}</span>`;
    document.getElementById("batt-reading").innerHTML =
      `<span class="status-${cls}">${snap.battery_v.toFixed(2)} V</span>`;
    pushBattery(snap.battery_v);
    if (lastBattLogged === null || Math.abs(snap.battery_v - lastBattLogged) >= 0.05) {
      lastBattLogged = snap.battery_v;
      log(`battery ${snap.battery_v.toFixed(2)} V (${label})`,
          cls === "good" ? "batt" : cls === "warning" ? "warn" : "err");
    }
  } else {
    battEl.textContent = "—";
    battSub.textContent = "no reading";
    document.getElementById("batt-reading").textContent = "—";
  }

  const joints = snap.legs.flatMap((l) => l.joints);
  const at = joints.filter((j) => j.at_target).length;
  document.getElementById("hud-servo").textContent = `${at}/${joints.length}`;
  document.getElementById("hud-servo-sub").textContent =
    snap.all_at_target ? "all at target" : "moving";
}

setInterval(() => {
  const sub = document.getElementById("hud-rate-sub");
  if (!lastMsgAt) { sub.textContent = "no packets"; return; }
  const age = (Date.now() - lastMsgAt) / 1000;
  sub.textContent = age < 1.5 ? "streaming" : `stale ${age.toFixed(0)}s`;
}, 500);

/* ================= battery chart ================= */
const battHistory = [];             // { t: ms, v: volts }
const BATT_MAX_POINTS = 1200;       // ~5 min of history at 250 ms spacing
let lastBattPush = 0;
let battPlot = null;                // last drawn geometry, for hover hit-testing
const battChart = document.getElementById("batt-chart");
const battTip = document.getElementById("batt-tip");
const battEmpty = document.getElementById("batt-empty");

function pushBattery(v) {
  const now = Date.now();
  if (now - lastBattPush < 250) return;   // downsample to keep the line light
  lastBattPush = now;
  battHistory.push({ t: now, v });
  if (battHistory.length > BATT_MAX_POINTS) battHistory.shift();
  renderBattChart();
}

// pick ~count round-number voltage ticks spanning [min, max]
function niceTicks(min, max, count) {
  const raw = (max - min) / count;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  const step = (norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10) * mag;
  const out = [];
  for (let t = Math.ceil(min / step) * step; t <= max + 1e-9; t += step) out.push(t);
  return out;
}

function renderBattChart() {
  if (battHistory.length < 2) {
    battEmpty.style.display = "";
    battChart.style.display = "none";
    return;
  }
  battEmpty.style.display = "none";
  battChart.style.display = "";

  const w = battChart.clientWidth || 360;
  const h = battChart.clientHeight || 96;
  const padL = 34, padR = 8, padT = 8, padB = 16;
  const iw = w - padL - padR, ih = h - padT - padB;

  const vs = battHistory.map((d) => d.v);
  let vmin = Math.min(...vs), vmax = Math.max(...vs);
  const span = Math.max(vmax - vmin, 0.2);
  vmin -= span * 0.15; vmax += span * 0.15;
  const range = vmax - vmin;

  const t0 = battHistory[0].t, t1 = battHistory[battHistory.length - 1].t;
  const tspan = Math.max(t1 - t0, 1);
  const X = (t) => padL + ((t - t0) / tspan) * iw;
  const Y = (v) => padT + (1 - (v - vmin) / range) * ih;

  const pts = battHistory.map((d) => ({ x: X(d.t), y: Y(d.v), t: d.t, v: d.v }));
  battPlot = { pts, w, h, baseY: h - padB };

  let grid = "";
  for (const tv of niceTicks(vmin, vmax, 3)) {
    const y = Y(tv).toFixed(1);
    grid += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${w - padR}" y2="${y}"/>`
         +  `<text class="axis-label" x="${padL - 5}" y="${y}" text-anchor="end" dominant-baseline="middle">${tv.toFixed(1)}</text>`;
  }

  const line = pts.map((p, i) => `${i ? "L" : "M"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join("");
  const area = `M${pts[0].x.toFixed(1)},${battPlot.baseY.toFixed(1)}`
             + pts.map((p) => `L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join("")
             + `L${pts[pts.length - 1].x.toFixed(1)},${battPlot.baseY.toFixed(1)}Z`;

  const dur = Math.round((t1 - t0) / 1000);
  const durLabel = dur >= 60 ? `${Math.floor(dur / 60)}m ${dur % 60}s ago` : `${dur}s ago`;

  battChart.setAttribute("viewBox", `0 0 ${w} ${h}`);
  battChart.innerHTML =
    grid +
    `<path class="batt-area" d="${area}"/>` +
    `<path class="batt-line" d="${line}"/>` +
    `<text class="axis-label" x="${padL}" y="${h - 4}">${durLabel}</text>` +
    `<text class="axis-label" x="${w - padR}" y="${h - 4}" text-anchor="end">now</text>`;
}

function drawBattCross(p) {
  removeBattCross();
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.id = "batt-cross-g";
  g.innerHTML =
    `<line class="cross" x1="${p.x.toFixed(1)}" y1="6" x2="${p.x.toFixed(1)}" y2="${battPlot.baseY.toFixed(1)}"/>`
  + `<circle class="cross-dot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5"/>`;
  battChart.appendChild(g);
}
function removeBattCross() {
  const g = document.getElementById("batt-cross-g");
  if (g) g.remove();
}

battChart.addEventListener("mousemove", (e) => {
  if (!battPlot) return;
  const rect = battChart.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (battPlot.w / rect.width);
  let best = battPlot.pts[0], bd = Infinity;
  for (const p of battPlot.pts) {
    const d = Math.abs(p.x - mx);
    if (d < bd) { bd = d; best = p; }
  }
  drawBattCross(best);

  const age = Math.round((Date.now() - best.t) / 1000);
  battTip.innerHTML = `<b>${best.v.toFixed(2)} V</b> · ${age <= 0 ? "now" : age + "s ago"}`;
  battTip.style.display = "block";
  const tw = battTip.offsetWidth, th = battTip.offsetHeight;
  let tx = e.clientX + 12, ty = e.clientY - th - 8;
  if (tx + tw > innerWidth - 6) tx = e.clientX - tw - 12;
  if (ty < 6) ty = e.clientY + 16;
  battTip.style.left = tx + "px";
  battTip.style.top = ty + "px";
});
battChart.addEventListener("mouseleave", () => {
  battTip.style.display = "none";
  removeBattCross();
});

new ResizeObserver(() => renderBattChart()).observe(battChart);

/* ================= resizable side panel ================= */
(() => {
  const panel = document.getElementById("panel");
  const resizer = document.getElementById("resizer");
  const DEFAULT_W = 400, MIN_W = 260;
  const maxW = () => Math.min(innerWidth - 320, innerWidth * 0.75);
  const clamp = (w) => Math.max(MIN_W, Math.min(w, maxW()));

  const saved = parseInt(localStorage.getItem("pc-panel-w") || "", 10);
  if (!isNaN(saved)) panel.style.width = clamp(saved) + "px";

  let dragging = false;
  resizer.addEventListener("pointerdown", (e) => {
    dragging = true;
    resizer.setPointerCapture(e.pointerId);
    resizer.classList.add("dragging");
    document.body.classList.add("col-resizing");
    e.preventDefault();
  });
  resizer.addEventListener("pointermove", (e) => {
    if (dragging) panel.style.width = clamp(innerWidth - e.clientX) + "px";
  });
  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove("dragging");
    document.body.classList.remove("col-resizing");
    localStorage.setItem("pc-panel-w", parseInt(panel.style.width, 10));
    try { resizer.releasePointerCapture(e.pointerId); } catch {}
  }
  resizer.addEventListener("pointerup", endDrag);
  resizer.addEventListener("pointercancel", endDrag);
  resizer.addEventListener("dblclick", () => {
    panel.style.width = DEFAULT_W + "px";
    localStorage.setItem("pc-panel-w", DEFAULT_W);
  });
  addEventListener("resize", () => {
    if (panel.style.width) panel.style.width = clamp(parseInt(panel.style.width, 10)) + "px";
  });
})();

const readoutBody = document.getElementById("readout-body");
const readoutRows = new Map(); // legId -> {cells: {coxa,femur,tibia}}

function renderReadout(snap) {
  for (const leg of snap.legs) {
    let row = readoutRows.get(leg.id);
    if (!row) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td class="leg">${leg.id.replace("_", " ")}</td><td></td><td></td><td></td>`;
      readoutBody.appendChild(tr);
      row = { cells: tr.querySelectorAll("td") };
      readoutRows.set(leg.id, row);
    }
    ["coxa", "femur", "tibia"].forEach((name, i) => {
      const j = leg.joints.find((x) => x.name === name);
      const cell = row.cells[i + 1];
      if (!j) { cell.textContent = "—"; return; }
      const pinned = !j.at_target &&
        (j.angle_deg <= j.min_deg + 0.5 || j.angle_deg >= j.max_deg - 0.5);
      cell.textContent = `${j.angle_deg.toFixed(1)}→${j.target_deg.toFixed(0)}`;
      cell.className = pinned ? "lim" : j.at_target ? "at" : "mov";
    });
  }
}

function logEvents(snap) {
  // aggregated target changes
  const changes = [];
  for (const leg of snap.legs) {
    for (const j of leg.joints) {
      const prev = prevTargets.get(j.channel);
      if (prev !== undefined && Math.abs(prev - j.target_deg) > 0.01) {
        changes.push({ leg: leg.id, joint: j.name, to: j.target_deg });
      }
      prevTargets.set(j.channel, j.target_deg);
    }
  }
  if (changes.length > 0) {
    const targets = new Set(changes.map((c) => c.to.toFixed(1)));
    if (targets.size === 1) {
      log(`target → ${changes[0].to.toFixed(1)}° (${changes.length} joints)`, "sys");
    } else {
      for (const c of changes.slice(0, 6)) {
        log(`target ${c.leg}.${c.joint} → ${c.to.toFixed(1)}°`, "sys");
      }
      if (changes.length > 6) log(`… and ${changes.length - 6} more`, "sys");
    }
  }

  if (prevAllAtTarget === false && snap.all_at_target) {
    log("all servos at target", "good");
  }
  prevAllAtTarget = snap.all_at_target;

  for (const leg of snap.legs) {
    for (const j of leg.joints) {
      const pinned = !j.at_target &&
        (j.angle_deg <= j.min_deg + 0.5 || j.angle_deg >= j.max_deg - 0.5);
      if (pinned && !limitWarned.has(j.channel)) {
        limitWarned.add(j.channel);
        log(`${leg.id}.${j.name} pinned at limit (${j.angle_deg.toFixed(1)}°)`, "warn");
      } else if (!pinned) {
        limitWarned.delete(j.channel);
      }
    }
  }
}

/* ================= 3D scene ================= */
const canvas = document.getElementById("viewport");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 1, 5000);
camera.position.set(280, 260, 340);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 60, 0);
controls.maxDistance = 1500;
controls.minDistance = 80;
controls.maxPolarAngle = Math.PI / 2 - 0.02;

scene.add(new THREE.HemisphereLight(0xffffff, 0x222222, 1.1));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
dirLight.position.set(200, 400, 150);
scene.add(dirLight);

let grid = null;
const matBody   = new THREE.MeshStandardMaterial({ metalness: 0.2, roughness: 0.55 });
const matLeg    = new THREE.MeshStandardMaterial({ metalness: 0.3, roughness: 0.4 });
const matJoint  = new THREE.MeshStandardMaterial({ metalness: 0.1, roughness: 0.3 });
const matFootAt = new THREE.MeshStandardMaterial({ metalness: 0.1, roughness: 0.3 });
const matGhost  = new THREE.LineBasicMaterial({ transparent: true, opacity: 0.35 });

/* ---- 3D text labels, in two independently-toggled groups:
     "joint" = per-servo name + channel · "leg" = leg id from config ---- */
let labelsOn = localStorage.getItem("pc-labels") === "1";
let legNamesOn = localStorage.getItem("pc-legnames") === "1";
const allLabels = [];
const groupOn = (group) => (group === "leg" ? legNamesOn : labelsOn);

function drawLabel(entry) {
  const ctx = entry.canvas.getContext("2d");
  const { width: w, height: h } = entry.canvas;
  ctx.clearRect(0, 0, w, h);
  ctx.globalAlpha = 0.88;
  ctx.fillStyle = cssVar("--surface");
  ctx.beginPath();
  ctx.roundRect(2, 2, w - 4, h - 4, 14);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = cssVar("--baseline");
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = cssVar("--text-primary");
  ctx.font = "600 30px ui-monospace, Consolas, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(entry.text, w / 2, h / 2 + 2);
  entry.tex.needsUpdate = true;
}

function makeLabel(text, group) {
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 72;
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sprite.scale.set(60, 17, 1);
  sprite.renderOrder = 10;
  sprite.visible = groupOn(group);
  const entry = { text, canvas, tex, sprite, group };
  drawLabel(entry);
  allLabels.push(entry);
  scene.add(sprite);
  return sprite;
}

function wireLabelToggle(btnId, group, storeKey, get, set) {
  const btn = document.getElementById(btnId);
  const sync = () => btn.classList.toggle("primary", get());
  btn.addEventListener("click", () => {
    set(!get());
    localStorage.setItem(storeKey, get() ? "1" : "0");
    for (const l of allLabels) if (l.group === group) l.sprite.visible = get();
    sync();
  });
  sync();
}
wireLabelToggle("labels-btn", "joint", "pc-labels",
  () => labelsOn, (v) => (labelsOn = v));
wireLabelToggle("leg-names-btn", "leg", "pc-legnames",
  () => legNamesOn, (v) => (legNamesOn = v));

function applySceneTheme() {
  const bg = new THREE.Color(cssVar("--page"));
  scene.background = bg;
  scene.fog = new THREE.Fog(bg, 900, 2400);
  if (grid) { scene.remove(grid); grid.geometry.dispose(); }
  grid = new THREE.GridHelper(2000, 40,
    new THREE.Color(cssVar("--baseline")), new THREE.Color(cssVar("--grid")));
  scene.add(grid);
  matBody.color.set(cssVar("--surface"));
  matBody.emissive.set(cssVar("--series-1"));
  matBody.emissiveIntensity = 0.06;
  matLeg.color.set(cssVar("--series-1"));
  matJoint.color.set(cssVar("--text-secondary"));
  matFootAt.color.set(cssVar("--good"));
  matGhost.color.set(cssVar("--text-muted"));
  for (const l of allLabels) drawLabel(l);
}
applySceneTheme();

let bodyH = 95; // mm, body center above the grid — eased so the lowest foot rests on it

// robot frame (x fwd, y left, z up) -> three frame (x right, y up, z back)
function toThree(p) { return new THREE.Vector3(-p.y, p.z + bodyH, -p.x); }

const body = new THREE.Mesh(new THREE.BoxGeometry(100, 36, 140), matBody);
body.position.y = bodyH;
scene.add(body);
const nose = new THREE.Mesh(new THREE.ConeGeometry(9, 18, 4), matLeg);
nose.rotation.x = -Math.PI / 2;
nose.position.set(0, bodyH, -80);
scene.add(nose);

const segGeom   = new THREE.CylinderGeometry(3.2, 3.2, 1, 10);
const jointGeom = new THREE.SphereGeometry(5.5, 16, 12);
const footGeom  = new THREE.SphereGeometry(4.5, 16, 12);

const legVisuals = new Map(); // legId -> {segs[3], joints[3], foot, ghost}

function makeLegVisual(leg) {
  const v = {
    segs: [0, 1, 2].map(() => new THREE.Mesh(segGeom, matLeg)),
    joints: [0, 1, 2].map(() => new THREE.Mesh(jointGeom, matJoint)),
    foot: new THREE.Mesh(footGeom, matFootAt),
    ghost: new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()]),
      matGhost),
    // one label per servo, sitting at the joint that servo drives
    labels: ["coxa", "femur", "tibia"].map((name) => {
      const j = leg.joints.find((x) => x.name === name);
      return makeLabel(j ? `${name} ch${j.channel}` : name, "joint");
    }),
    // config leg id, floating above the hip
    legLabel: makeLabel(leg.id, "leg"),
  };
  for (const s of v.segs) scene.add(s);
  for (const j of v.joints) scene.add(j);
  scene.add(v.foot);
  scene.add(v.ghost);
  return v;
}

const UP = new THREE.Vector3(0, 1, 0);
function setSegment(mesh, a, b) {
  const dir = new THREE.Vector3().subVectors(b, a);
  const len = Math.max(dir.length(), 0.001);
  mesh.position.copy(a).addScaledVector(dir, 0.5);
  mesh.quaternion.setFromUnitVectors(UP, dir.normalize());
  mesh.scale.set(1, len, 1);
}

/* Forward kinematics taken straight from SunFounder's polar2coord — the exact
   model for this robot. Lengths: A = femur (48, hip->knee), B = tibia (78,
   knee->foot fin), C = coxa (33, horizontal offset from the yaw axis).
     beta  = femur servo -> femur elevation from horizontal is (90 - beta):
             beta 0 = riser straight up, beta 90 = femur horizontal.
     alpha = tibia servo -> interior knee angle (between femur and tibia) is
             (90 + alpha): alpha 0 = fin ⊥ femur (horizontal at rest),
             +alpha opens the fin upward.
     gamma = coxa yaw, applied as the leg's horizontal `dir` (uniform pinwheel).
   Verified numerically: all-0 -> riser up & fin horizontal; +tibia lifts the
   fin, +femur tips the whole leg down. */
function legChainRobot(mount, geom, coxaDeg, femurRaw, tibiaRaw) {
  const rad = (d) => (d * Math.PI) / 180;
  const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
  const [mx, my] = mount;
  const dir = Math.atan2(my, mx) + rad(coxaDeg);
  const cd = Math.cos(dir), sd = Math.sin(dir);

  const A = geom.femur_length_mm, B = geom.tibia_length_mm, C = geom.coxa_length_mm;
  const beta  = femurRaw;
  const alpha = tibiaRaw;

  // femur-tibia triangle: L1 = hip-to-foot distance in the leg plane
  const L1 = Math.sqrt(A * A + B * B - 2 * A * B * Math.cos(rad(90 + alpha)));
  const angInner = Math.acos(clamp((A * A + L1 * L1 - B * B) / (2 * A * L1), -1, 1));
  const ang = rad(90 - beta) - angInner;   // elevation of the hip-foot line

  // points live in (h = horizontal distance along dir, z = height)
  const place = (h, z) => ({ x: mx + cd * h, y: my + sd * h, z });
  const hip     = place(0, 0);
  const coxaEnd = place(C, 0);
  const knee    = place(C + A * Math.sin(rad(beta)), A * Math.cos(rad(beta)));
  const foot    = place(C + L1 * Math.cos(ang), L1 * Math.sin(ang));
  return [hip, coxaEnd, knee, foot];
}

function renderRobot(snap) {
  const geom = snap.geometry || { coxa_length_mm: 33, femur_length_mm: 48, tibia_length_mm: 78 };

  // first pass in the robot frame, so the body can settle onto the lowest foot
  const chains = [];
  let minZ = 0;
  for (const leg of snap.legs) {
    const coxa  = leg.joints.find((j) => j.name === "coxa");
    const femur = leg.joints.find((j) => j.name === "femur");
    const tibia = leg.joints.find((j) => j.name === "tibia");
    if (!coxa || !femur || !tibia) continue;

    // coxa yaw sign comes from telemetry (uniform pinwheel fallback)
    const dc = coxa.direction ?? -1;
    const pts = legChainRobot(leg.mount_offset_mm, geom,
      coxa.angle_deg * dc, femur.angle_deg, tibia.angle_deg);
    const ghost = legChainRobot(leg.mount_offset_mm, geom,
      coxa.target_deg * dc, femur.target_deg, tibia.target_deg);
    for (const p of pts) minZ = Math.min(minZ, p.z);
    chains.push({ leg, pts, ghost, atTarget: coxa.at_target && femur.at_target && tibia.at_target });
  }

  // feet above hip level -> nothing to stand on, so the chassis (36mm tall) rests on the ground
  const settledH = Math.max(20, -minZ + 2);
  bodyH += (settledH - bodyH) * 0.15;
  body.position.y = bodyH;
  nose.position.y = bodyH;

  for (const { leg, pts: raw, ghost: rawGhost, atTarget } of chains) {
    let v = legVisuals.get(leg.id);
    if (!v) { v = makeLegVisual(leg); legVisuals.set(leg.id, v); }

    const pts = raw.map(toThree);
    for (let i = 0; i < 3; i++) {
      setSegment(v.segs[i], pts[i], pts[i + 1]);
      v.joints[i].position.copy(pts[i]);
      v.labels[i].position.copy(pts[i]);
      v.labels[i].position.y += 15;
    }
    v.legLabel.position.copy(pts[0]);
    v.legLabel.position.y += 34;
    v.foot.position.copy(pts[3]);
    v.foot.material = atTarget ? matFootAt : matJoint;

    v.ghost.geometry.setFromPoints(rawGhost.map(toThree));
  }
}

function resize() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(canvas.parentElement);
resize();

renderer.setAnimationLoop(() => {
  controls.update();
  renderer.render(scene, camera);
});

/* ================= snapshot handler ================= */
function handleSnapshot(snap) {
  if (!snap || snap.type !== "telemetry" || !Array.isArray(snap.legs)) return;
  if (snap.name) {
    document.getElementById("robot-name").innerHTML = `${snap.name} <span>telemetry</span>`;
  }
  renderHud(snap);
  renderReadout(snap);
  logEvents(snap);
  renderRobot(snap);
}

/* a neutral zero-pose snapshot so the 3D viewer shows the robot
   before any telemetry or demo has arrived */
function neutralSnap() {
  const ids = ["front_left", "front_right", "back_left", "back_right"];
  const offs = [[60,60,0],[60,-60,0],[-60,60,0],[-60,-60,0]];
  return {
    type: "telemetry", name: "picrawler", battery_v: null, all_at_target: true,
    geometry: { coxa_length_mm: 33, femur_length_mm: 48, tibia_length_mm: 78 },
    legs: ids.map((id, i) => ({
      id, mount_offset_mm: offs[i],
      joints: ["coxa", "femur", "tibia"].map((name, j) => ({
        name, channel: i * 3 + j, angle_deg: 0, target_deg: 0,
        min_deg: 0, max_deg: 90, direction: name === "coxa" ? -1 : 1, at_target: true,
      })),
    })),
  };
}

handleSnapshot(neutralSnap());
log("dashboard ready — connect to the robot or start demo mode", "sys");
</script>
